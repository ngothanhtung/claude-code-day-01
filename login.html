<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            bg: '#090A14',
            surface: '#0F1120',
            surface2: '#161829',
            border: '#1F2138',
            primary: '#DF6B33',
            'primary-light': '#F0824A',
            'primary-dark': '#C25A26',
            muted: '#6B7280',
          },
          fontFamily: {
            poppins: ['Poppins', 'sans-serif'],
            inter: ['Inter', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: #090A14; }
    ::selection { background: #DF6B33; color: #090A14; }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #090A14; }
    ::-webkit-scrollbar-thumb { background: #1F2138; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #DF6B33; }

    /* Entrance animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%       { transform: translate(40px, -30px) scale(1.08); }
      66%       { transform: translate(-20px, 20px) scale(0.95); }
    }
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    @keyframes pulse-ring {
      0%   { transform: scale(1); opacity: 0.4; }
      50%  { transform: scale(1.15); opacity: 0.1; }
      100% { transform: scale(1); opacity: 0.4; }
    }

    .animate-fade-up   { animation: fadeUp  0.7s cubic-bezier(.16,1,.3,1) forwards; opacity: 0; }
    .animate-fade-in   { animation: fadeIn  0.8s ease-out forwards; opacity: 0; }
    .animate-orb       { animation: orbFloat 12s ease-in-out infinite; }
    .animate-delay-1   { animation-delay: 0.1s; }
    .animate-delay-2   { animation-delay: 0.2s; }
    .animate-delay-3   { animation-delay: 0.35s; }
    .animate-delay-4   { animation-delay: 0.5s; }
    .animate-delay-5   { animation-delay: 0.65s; }
    .animate-delay-6   { animation-delay: 0.8s; }

    /* Background orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
    }

    /* Form glassmorphism card */
    .glass-card {
      background: rgba(15, 17, 32, 0.75);
      backdrop-filter: blur(32px);
      -webkit-backdrop-filter: blur(32px);
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03),
        0 24px 64px rgba(0,0,0,0.6),
        0 0 80px rgba(223,107,51,0.06) inset;
    }

    /* Input focus glow */
    .input-glow:focus {
      box-shadow: 0 0 0 2px rgba(223,107,51,0.3), 0 0 20px rgba(223,107,51,0.08);
      border-color: #DF6B33;
    }

    /* Primary button shimmer */
    .btn-primary {
      background: linear-gradient(135deg, #DF6B33 0%, #F0824A 50%, #DF6B33 100%);
      background-size: 200% auto;
      position: relative;
      overflow: hidden;
    }
    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s;
    }
    .btn-primary:hover::before { transform: translateX(100%); }
    .btn-primary:hover {
      background-position: right center;
      box-shadow: 0 8px 32px rgba(223,107,51,0.4), 0 0 0 1px rgba(223,107,51,0.2);
      transform: translateY(-2px);
    }
    .btn-primary:active { transform: translateY(0); }

    /* Social buttons */
    .btn-social {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      transition: all 0.25s cubic-bezier(.16,1,.3,1);
    }
    .btn-social:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(223,107,51,0.35);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }

    /* Password toggle */
    .password-toggle {
      transition: color 0.2s;
    }
    .password-toggle:hover { color: #DF6B33; }

    /* Divider */
    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
    }

    /* Ring pulse on logo */
    .ring-pulse { animation: pulse-ring 3s ease-in-out infinite; }

    /* Noise texture overlay */
    .noise-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 50;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    }
  </style>
</head>
<body class="font-inter text-white min-h-screen flex items-center justify-center overflow-hidden relative">

  <!-- Noise overlay -->
  <div class="noise-overlay"></div>

  <!-- Background orbs -->
  <div class="orb animate-orb w-[500px] h-[500px] bg-[#DF6B33] opacity-[0.07]"
       style="top: -120px; left: -120px;"></div>
  <div class="orb animate-orb w-[400px] h-[400px] bg-[#F0824A] opacity-[0.05]"
       style="bottom: -80px; right: -80px; animation-delay: -4s;"></div>
  <div class="orb animate-orb w-[300px] h-[300px] bg-[#6B21A8] opacity-[0.04]"
       style="top: 50%; left: 55%; transform: translate(-50%,-50%); animation-delay: -8s;"></div>

  <!-- Grid background -->
  <div class="absolute inset-0"
    style="background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 48px 48px;">
  </div>

  <!-- Login card -->
  <div class="relative z-10 w-full max-w-[440px] mx-4 animate-fade-up animate-delay-1">
    <div class="glass-card rounded-3xl p-8 sm:p-10">

      <!-- Logo / Brand mark -->
      <div class="flex justify-center mb-8 animate-fade-in animate-delay-2">
        <div class="relative">
          <div class="absolute inset-0 rounded-2xl ring-pulse"
               style="border: 2px solid rgba(223,107,51,0.2);"></div>
          <div class="w-14 h-14 rounded-2xl flex items-center justify-center"
               style="background: linear-gradient(135deg, #DF6B33, #C25A26);">
            <i data-lucide="layers" class="w-7 h-7 text-white"></i>
          </div>
        </div>
      </div>

      <!-- Heading -->
      <div class="text-center mb-8 animate-fade-up animate-delay-3">
        <h1 class="font-poppins font-extrabold text-3xl sm:text-4xl text-white mb-2 tracking-tight">
          Welcome back
        </h1>
        <p class="font-inter text-sm text-gray-400">
          Sign in to your account to continue
        </p>
      </div>

      <!-- Form -->
      <form id="loginForm" class="space-y-5 animate-fade-up animate-delay-4" novalidate>

        <!-- Email -->
        <div>
          <label for="email" class="block font-poppins font-semibold text-xs text-gray-300 mb-2 tracking-wide uppercase" style="letter-spacing: 0.08em;">
            Email address
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <i data-lucide="mail" class="w-4 h-4 text-gray-500"></i>
            </div>
            <input
              id="email"
              type="email"
              placeholder="you@example.com"
              autocomplete="email"
              class="input-glow w-full pl-11 pr-4 py-3.5 rounded-xl
                     bg-[#0F1120] border border-[#1F2138]
                     text-white placeholder-gray-600
                     font-inter text-sm
                     focus:outline-none transition-all duration-300"
            />
          </div>
          <!-- Email error -->
          <p id="emailError" class="hidden mt-1.5 text-xs font-inter text-red-400 flex items-center gap-1.5">
            <i data-lucide="alert-circle" class="w-3.5 h-3.5 shrink-0"></i>
            <span></span>
          </p>
        </div>

        <!-- Password -->
        <div>
          <label for="password" class="block font-poppins font-semibold text-xs text-gray-300 mb-2 tracking-wide uppercase" style="letter-spacing: 0.08em;">
            Password
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <i data-lucide="lock" class="w-4 h-4 text-gray-500"></i>
            </div>
            <input
              id="password"
              type="password"
              placeholder="Enter your password"
              autocomplete="current-password"
              class="input-glow w-full pl-11 pr-12 py-3.5 rounded-xl
                     bg-[#0F1120] border border-[#1F2138]
                     text-white placeholder-gray-600
                     font-inter text-sm
                     focus:outline-none transition-all duration-300"
            />
            <button
              type="button"
              id="togglePassword"
              class="password-toggle absolute inset-y-0 right-0 pr-4 flex items-center text-gray-500 cursor-pointer"
              aria-label="Toggle password visibility"
            >
              <i data-lucide="eye-off" id="eyeIcon" class="w-4 h-4"></i>
            </button>
          </div>
          <!-- Password error -->
          <p id="passwordError" class="hidden mt-1.5 text-xs font-inter text-red-400 flex items-center gap-1.5">
            <i data-lucide="alert-circle" class="w-3.5 h-3.5 shrink-0"></i>
            <span></span>
          </p>
        </div>

        <!-- Remember + Forgot -->
        <div class="flex items-center justify-between">
          <label class="flex items-center gap-2.5 cursor-pointer group select-none">
            <div class="relative">
              <input type="checkbox" id="remember" class="sr-only peer">
              <div class="w-5 h-5 rounded-md border border-[#1F2138]
                          bg-[#0F1120] peer-checked:bg-[#DF6B33] peer-checked:border-[#DF6B33]
                          peer-focus:ring-2 peer-focus:ring-[#DF6B33]/30
                          transition-all duration-200
                          flex items-center justify-center
                          peer-hover:border-[#DF6B33]/50">
                <i data-lucide="check" class="w-3 h-3 text-white opacity-0 peer-checked:opacity-100 transition-opacity duration-150"></i>
              </div>
            </div>
            <span class="font-inter text-sm text-gray-400 group-hover:text-gray-200 transition-colors duration-200">
              Remember me
            </span>
          </label>
          <a href="#"
             class="font-inter text-sm text-[#DF6B33] hover:text-[#F0824A]
                    transition-colors duration-200
                    hover:underline underline-offset-4">
            Forgot password?
          </a>
        </div>


        <!-- Submit -->
        <button
          type="submit"
          id="submitBtn"
          class="btn-primary w-full py-3.5 rounded-xl
                 font-poppins font-bold text-base text-white
                 tracking-wide
                 transition-all duration-300
                 cursor-pointer"
        >
          <span id="btnText">Sign in</span>
          <span id="btnLoading" class="hidden items-center justify-center gap-2">
            <svg class="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
            </svg>
            Signing in…
          </span>
        </button>
      </form>

      <!-- Divider -->
      <div class="flex items-center gap-3 my-6 animate-fade-up animate-delay-5">
        <div class="divider-line"></div>
        <span class="font-inter text-xs text-gray-600 uppercase tracking-widest">or continue with</span>
        <div class="divider-line"></div>
      </div>

      <!-- Social login -->
      <div class="grid grid-cols-3 gap-3 animate-fade-up animate-delay-5">
        <!-- Google -->
        <button type="button" class="btn-social flex items-center justify-center gap-2 py-3 rounded-xl cursor-pointer group" aria-label="Sign in with Google">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          <span class="font-inter text-sm text-gray-300 group-hover:text-white transition-colors">Google</span>
        </button>

        <!-- GitHub -->
        <button type="button" class="btn-social flex items-center justify-center gap-2 py-3 rounded-xl cursor-pointer group" aria-label="Sign in with GitHub">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
          </svg>
          <span class="font-inter text-sm text-gray-300 group-hover:text-white transition-colors">GitHub</span>
        </button>

        <!-- Facebook -->
        <button type="button" class="btn-social flex items-center justify-center gap-2 py-3 rounded-xl cursor-pointer group" aria-label="Sign in with Facebook">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="#1877F2">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
          </svg>
          <span class="font-inter text-sm text-gray-300 group-hover:text-white transition-colors">Facebook</span>
        </button>
      </div>

      <!-- Sign up link -->
      <p class="text-center font-inter text-sm text-gray-500 mt-8 animate-fade-up animate-delay-6">
        Don't have an account?
        <a href="register.html" class="text-[#DF6B33] hover:text-[#F0824A] font-medium hover:underline underline-offset-4 transition-colors duration-200">
          Register here
        </a>
      </p>
    </div>

    <!-- Footer note -->
    <p class="text-center font-inter text-xs text-gray-700 mt-6 animate-fade-in animate-delay-6">
      By signing in, you agree to our
      <a href="#" class="hover:text-gray-400 transition-colors">Terms</a> &amp;
      <a href="#" class="hover:text-gray-400 transition-colors">Privacy Policy</a>
    </p>
  </div>

  <script>
    // Initialize Lucide icons
    lucide.createIcons();

    // Toggle password visibility
    const toggleBtn = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eyeIcon');

    toggleBtn.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      eyeIcon.setAttribute('data-lucide', isPassword ? 'eye' : 'eye-off');
      lucide.createIcons();
    });

    // Form submission
    const form = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const btnLoading = document.getElementById('btnLoading');
    const errorMsg = document.getElementById('errorMsg');

    form.addEventListener('submit', (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      // Clear all errors first
      hideError('emailError');
      hideError('passwordError');

      // Validation
      let hasError = false;

      if (!email) {
        showError('emailError', 'Email address is required.');
        hasError = true;
      } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showError('emailError', 'Please enter a valid email address.');
        hasError = true;
      }

      if (!password) {
        showError('passwordError', 'Password is required.');
        hasError = true;
      }

      if (hasError) return;

      // Simulate loading
      btnText.classList.add('hidden');
      btnLoading.classList.remove('hidden');
      btnLoading.classList.add('flex');
      submitBtn.disabled = true;
      submitBtn.style.opacity = '0.8';

      setTimeout(() => {
        btnText.classList.remove('hidden');
        btnLoading.classList.add('hidden');
        btnLoading.classList.remove('flex');
        submitBtn.disabled = false;
        submitBtn.style.opacity = '1';
        // Here you would redirect or call your auth API
      }, 1800);
    });

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.querySelector('span').textContent = msg;
      el.classList.remove('hidden');
      el.classList.add('flex');
      lucide.createIcons();
    }
    function hideError(id) {
      const el = document.getElementById(id);
      el.classList.add('hidden');
      el.classList.remove('flex');
    }
  </script>
</body>
</html>
